<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="sphereGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="50%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F2FE" />
      <stop offset="100%" stop-color="#BAE6FD" />
    </linearGradient>
  </defs>

  <!-- Outer Wireframe Sphere -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#sphereGrad)" stroke-width="2" stroke-dasharray="10 5" opacity="0.5"/>
  <ellipse cx="100" cy="100" rx="80" ry="30" fill="none" stroke="url(#sphereGrad)" stroke-width="2" opacity="0.6" transform="rotate(45 100 100)"/>
  <ellipse cx="100" cy="100" rx="80" ry="30" fill="none" stroke="url(#sphereGrad)" stroke-width="2" opacity="0.6" transform="rotate(-45 100 100)"/>
  <ellipse cx="100" cy="100" rx="80" ry="30" fill="none" stroke="url(#sphereGrad)" stroke-width="2" opacity="0.6" transform="rotate(90 100 100)"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#sphereGrad)" stroke-width="3" opacity="0.8"/>

  <!-- Nodes (Dots on the sphere) -->
  <circle cx="20" cy="100" r="4" fill="#38BDF8" />
  <circle cx="180" cy="100" r="4" fill="#7C3AED" />
  <circle cx="100" cy="20" r="4" fill="#4F46E5" />
  <circle cx="100" cy="180" r="4" fill="#38BDF8" />
  <circle cx="45" cy="45" r="4" fill="#7C3AED" />
  <circle cx="155" cy="155" r="4" fill="#4F46E5" />
  <circle cx="45" cy="155" r="4" fill="#38BDF8" />
  <circle cx="155" cy="45" r="4" fill="#7C3AED" />

  <!-- Inner Document (Resume) Box -->
  <rect x="70" y="60" width="60" height="80" rx="4" fill="url(#docGrad)" stroke="#0ea5e9" stroke-width="2"/>
  
  <!-- Document Lines (Text) -->
  <line x1="78" y1="75" x2="100" y2="75" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/>
  <line x1="78" y1="85" x2="115" y2="85" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/>
  <line x1="78" y1="95" x2="122" y2="95" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Big Checkmark -->
  <path d="M85 115 L95 125 L115 105" fill="none" stroke="#2563EB" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
